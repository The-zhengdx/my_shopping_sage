<!-- layouts/shortcodes/amazon-card.html -->
<div style="border: 1px solid #eee; border-radius: 8px; padding: 15px; margin: 20px 0; max-width: 300px;">
    <img src="{{ .Get "image" }}" alt="{{ .Get "title" }}"
        style="width: 100%; border-radius: 4px; margin-bottom: 10px;">
    <h4 style="margin: 0 0 8px 0; font-size: 16px;">{{ .Get "title" }}</h4>
    <p style="color: #f59e0b; margin: 0 0 10px 0;">⭐ {{ .Get "rating" }} ({{ .Get "review_count" }})</p>
    <a href="{{ .Get "link" }}" target="_blank"
        style="display: inline-block; background: #ff9900; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-weight: bold;">
        View on Amazon
    </a>
</div>
