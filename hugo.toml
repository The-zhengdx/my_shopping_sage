baseURL = 'https://myshoppingsage.org/'
locale = 'en-us'
title = 'My Shopping Sage'
theme = 'mana'

[params]
  # Hero section title (optional - defaults to site.Title)
  heroTitleLine1 = "My Shopping Sage"  # First line of hero title
  heroTitleLine2 = "Your Buying Guides"    # Second line of hero title (optional)
  description = "Compare, Choose, Save — Simplified Product Reviews"
  footerText = "Disclosure: As an Amazon Associate, we earn from qualifying purchases."

[params.social]
  email = "contact-us@myshoppingsage.org"

[params.avatar]
  [params.avatar.home]
    enableResize = true
    assetPath = "images/logo.webp"
  [params.avatar.about]
    assetPath = "images/logo.webp"

[params.favicons]
  manifest = "favicon/site.webmanifest"
  ico = "/favicon/favicon.webp"
  png = "/favicon/favicon.webp"
  png16 = "/favicon/favicon.webp"
  png32 = "/favicon/favicon.webp"
  apple180 = "/favicon/apple-touch-icon.webp"
  android192 = "/favicon/web-app-manifest-192x192.webp"
  android512 = "/favicon/web-app-manifest-512x512.webp"


# Sitemap configuration for SEO
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[[menus.main]]
  name = 'Home'
  pageRef = '/'
  weight = 10

[[menus.main]]
  name = 'Posts'
  pageRef = '/posts'
  weight = 20

[[menus.main]]
  name = 'Tags'
  pageRef = '/tags'
  weight = 30

[pagination]
  pageSize = 10  # Number of posts per page (default: 10)

[outputs]
  home = ["HTML", "JSON"]

[caches]
  [caches.assets]
    dir = ':resourceDir/_gen'
    maxAge = -1
  [caches.getresource]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.images]
    dir = ':resourceDir/_gen'
    maxAge = -1
  [caches.misc]
    dir = ':cacheDir/:project'
    maxAge = -1
  [caches.modulegitinfo]
    dir = ':cacheDir/modules'
    maxAge = '24h'
  [caches.modulequeries]
    dir = ':cacheDir/modules'
    maxAge = '24h'
  [caches.modules]
    dir = ':cacheDir/modules'
    maxAge = -1

# Table of Contents (recommended)
[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  # Allow raw HTML within Markdown (for KaTeX, etc.)
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      # Enable block-level attributes for blockquotes and other block elements
      # Required for blockquote render hooks (alerts/admonitions)
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  # Syntax highlighting configuration for code blocks
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-macchiato"

[params.copyright]
  startYear = 2026
  owner = "My Shopping Sage. All Rights Reserved"

[params.umami]
  websiteId = "658c6862-028b-4c7a-a042-5de9278995a3"
